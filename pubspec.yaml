name: x_trainer
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Firebase ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.0

  # --- UI & Utilities ---
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  fl_chart: ^0.66.0
  simple_animation_progress_bar: ^1.6.0
  dotted_dashed_line: ^0.0.3
  simple_circular_progress_bar: ^1.0.2
  animated_toggle_switch: ^0.6.2
  readmore: ^2.1.0
  intl: ^0.18.1
  provider: ^6.1.1

  # --- AI Features (Offline) ---
  camera: ^0.10.5
  google_mlkit_pose_detection: ^0.10.0
  flutter_tts: ^3.8.3

  # --- Legacy/Other ---
  socket_io_client: ^2.0.3+1
  http: ^1.6.0
  image: ^4.1.3
  permission_handler: ^11.0.1
  speech_to_text: ^7.3.0
  image_picker: ^1.2.1
  file_picker: ^8.1.2
  google_generative_ai: ^0.4.7
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  # 👇 المكتبة الجديدة انضافت هنا
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

  assets:
    - assets/img/squat.jpg
    - assets/img/pushup.jpg
    - assets/img/curl.jpg
    - assets/img/lateral.jpg
    - assets/img/jump.jpg
    - assets/img/press.jpg
    - assets/img/lunges.jpg
    # 👇 ضفتلك مسار الصورة عشان لو حبيت تستخدمها جوه التطبيق
    - assets/x_trainer_icon.png
    - assets/img/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/font/Poppins-Regular.ttf
        - asset: assets/font/Poppins-Medium.ttf
          weight: 500
        - asset: assets/font/Poppins-Bold.ttf
          weight: 700

# 👇 إعدادات الأيقونة (مهمة جداً)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/x_trainer_icon.png"
  min_sdk_android: 21